<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Reset Password</h2>
    <p class="subtitle">Enter the OTP sent to your email</p>

    <div class="input-group">
      <label>Email</label>
      <input type="email" placeholder="Email" [(ngModel)]="email" />
    </div>

    <div class="input-group">
      <label>OTP</label>
      <input type="text" placeholder="Enter OTP" [(ngModel)]="otp" />
    </div>

    <div class="input-group">
      <label>New Password</label>
      <input type="password" placeholder="New Password" [(ngModel)]="newPassword" />
    </div>

    <button class="btn-primary" (click)="resetPassword()">Reset Password</button>

    <p class="back-link">
      <a routerLink="/auth/forgot-password">← Back</a>
    </p>
  </div>
</div>
