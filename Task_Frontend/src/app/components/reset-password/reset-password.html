<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Reset Password</h2>
    
    <!-- OTP sent info with email displayed as text -->
    <p class="subtitle">OTP sent to your email</p>
    <div class="email-display">
      {{ email }}
    </div>

    <!-- OTP Boxes Input -->
    <div class="otp-section">
      <label>Enter OTP</label>
      <div class="otp-boxes">
        <input 
          type="text" 
          maxlength="1" 
          [(ngModel)]="otp1" 
          (input)="onOtpInput(1, $event)"
          (keydown)="onOtpKeydown(1, $event)"
          #box1
        />
        <input 
          type="text" 
          maxlength="1" 
          [(ngModel)]="otp2" 
          (input)="onOtpInput(2, $event)"
          (keydown)="onOtpKeydown(2, $event)"
          #box2
        />
        <input 
          type="text" 
          maxlength="1" 
          [(ngModel)]="otp3" 
          (input)="onOtpInput(3, $event)"
          (keydown)="onOtpKeydown(3, $event)"
          #box3
        />
        <input 
          type="text" 
          maxlength="1" 
          [(ngModel)]="otp4" 
          (input)="onOtpInput(4, $event)"
          (keydown)="onOtpKeydown(4, $event)"
          #box4
        />
        <input 
          type="text" 
          maxlength="1" 
          [(ngModel)]="otp5" 
          (input)="onOtpInput(5, $event)"
          (keydown)="onOtpKeydown(5, $event)"
          #box5
        />
        <input 
          type="text" 
          maxlength="1" 
          [(ngModel)]="otp6" 
          (input)="onOtpInput(6, $event)"
          (keydown)="onOtpKeydown(6, $event)"
          #box6
        />
      </div>
    </div>

    <!-- New Password -->
    <div class="input-group">
      <label>New Password</label>
      <input 
        type="password" 
        placeholder="Enter new password" 
        [(ngModel)]="newPassword" 
      />
    </div>

    <!-- Confirm Password (Recommended for better UX) -->
    <div class="input-group">
      <label>Confirm Password</label>
      <input 
        type="password" 
        placeholder="Confirm new password" 
        [(ngModel)]="confirmPassword" 
      />
    </div>

    <button class="btn-primary" (click)="resetPassword()" [disabled]="loading">
      {{ loading ? 'Resetting...' : 'Reset Password' }}
    </button>

    <p class="back-link">
      <a routerLink="/auth/forgot-password">← Back</a>
    </p>
  </div>
</div>
