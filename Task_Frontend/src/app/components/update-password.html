<div class="auth-container">
  <div class="auth-card">
    <h2>Update Password</h2>
    <div class="form-group">
      <label>Current Password</label>
      <input type="password" [(ngModel)]="currentPassword" placeholder="Enter current password">
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" [(ngModel)]="newPassword" placeholder="Enter new password">
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm new password">
    </div>
    <div class="form-actions">
      <button class="btn-secondary" (click)="router.navigate([authService.getUserRole() === 'ADMIN' ? '/admin/dashboard' : '/user/dashboard'])">Cancel</button>
      <button class="btn-primary" (click)="updatePassword()" [disabled]="loading">Update Password</button>
    </div>
  </div>
</div>
