<div class="user-tasks-container">
  <div class="header">
    <h2>Tasks for {{ user?.name }}</h2>
    <button class="btn-primary" routerLink="/admin/users">
      <i class="fas fa-arrow-left"></i> Back to Users
    </button>
  </div>

  <div class="tasks-list">
    <div class="task-card" *ngFor="let task of tasks">
      <div class="task-header">
        <h3>{{ task.title }}</h3>
        <span class="status-badge" [class]="task.status.toLowerCase()">
          {{ task.status }}
        </span>
      </div>
      <p class="task-description">{{ task.description }}</p>
      <div class="task-footer">
        <span class="due-date">
          <i class="fas fa-calendar"></i> Due: {{ task.dueDate | date }}
        </span>
      </div>
    </div>

    <div class="empty-state" *ngIf="tasks.length === 0">
      <i class="fas fa-tasks"></i>
      <p>No tasks found for this user</p>
    </div>
  </div>
</div>
