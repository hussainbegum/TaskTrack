<div class="auth-wrapper">
  <div class="col-11 col-sm-8 col-md-5 col-lg-4">
    <div class="card auth-card p-3 p-lg-4">
      
      <div class="text-center mb-3">
        <div class="projector-icon mb-2">
          <i class="fas fa-chalkboard-user"></i>
        </div>
        <h1 class="brand-title">Login To Task Manager</h1>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="alert alert-danger mb-3">
        {{ errorMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <div class="form-floating mb-2">
          <input 
            type="email" 
            class="form-control" 
            id="email" 
            placeholder="Email" 
            formControlName="email"
            [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          >
          <label for="email">Email</label>
          <div class="invalid-feedback ps-2">Please enter a valid email</div>
        </div>

        <div class="form-floating mb-2">
          <input 
            type="password" 
            class="form-control" 
            id="password" 
            placeholder="Password" 
            formControlName="password"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          >
          <label for="password">Password</label>
          <div class="invalid-feedback ps-2">Password is required</div>
        </div>

        <button type="submit" class="btn btn-login w-100 mb-2" [disabled]="loading || loginForm.invalid">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Signing in...' : 'Login' }}
        </button>
      </form>

      <div class="text-center mt-2">
        <span class="text-muted small">Don't have an account?</span>
        <a routerLink="/auth/register" class="register-link ms-1">Register</a>
      </div>
      
    </div>
  </div>
</div>
