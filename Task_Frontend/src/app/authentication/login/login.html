<div class="auth-wrapper">
  <div class="col-11 col-sm-8 col-md-5 col-lg-4">
    <div class="card auth-card p-3 p-lg-4">
      
      <div class="text-center mb-3">
        <div class="projector-icon mb-2">
          <i class="fas fa-chalkboard-user"></i>
        </div>
        <h1 class="brand-title">Login For Your Task Manager</h1>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <div class="form-floating mb-2">
          <input 
            type="email" 
            class="form-control" 
            id="email" 
            placeholder="Email" 
            formControlName="email"
            [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          >
          <label for="email">Email</label>
          <div class="invalid-feedback ps-2">Please enter a valid email</div>
        </div>

        <div class="form-floating mb-2">
          <input 
            type="password" 
            class="form-control" 
            id="password" 
            placeholder="Password" 
            formControlName="password"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          >
          <label for="password">Password</label>
          <div class="invalid-feedback ps-2">Password is required</div>
        </div>

        <div class="d-flex justify-content-end mb-3">
          <a href="javascript:void(0)" class="forgot-link" (click)="onForgotPassword()">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-login w-100 mb-2" [disabled]="loading || loginForm.invalid">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Signing in...' : 'Login' }}
        </button>
      </form>

      <div class="welcome-message text-center mb-3">
        <p class="greeting">Welcome aboard my friend</p>
        <p class="action-hint">just a couple of clicks and we start</p>
      </div>

      <div class="text-center mt-2">
        <span class="text-muted small">Have no account yet?</span>
        <a routerLink="/auth/register" class="register-link ms-1" (click)="onRegistration()">Registration</a>
      </div>
      
    </div>
  </div>
</div>
<a routerLink="/forgot-password">
Forgot Password?
</a>
<!-- After password input -->
<div class="text-end mb-2">
  <a routerLink="/auth/forgot-password" class="text-muted small">
    Forgot password?
  </a>
</div>

<!-- Then Login button -->
<button (click)="login()">Login</button>
