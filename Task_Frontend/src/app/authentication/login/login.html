<div class="ui-reset-wrapper">
  <div class="login-page-container">
    
    <div class="form-section">
      <div class="form-wrapper" [ngClass]="{ 'shake-error': isInvalid }">
        <h2>LOGIN</h2>
        <p class="subtitle">Login For Your Task Manager</p>
        
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          
          <div class="input-group-custom" [class.has-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            <span class="icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
              </svg>
            </span>
            <input 
              type="email" 
              id="email" 
              placeholder="Email" 
              formControlName="email"
            >
            <div class="error-msg" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
              Please enter a valid email
            </div>
          </div>

          <div class="input-group-custom" [class.has-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            <span class="icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
              </svg>
            </span>
            <input 
              type="password" 
              id="password" 
              placeholder="Password" 
              formControlName="password"
            >
            <div class="error-msg" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
              Password is required
            </div>
          </div>

          <div class="forgot-wrapper">
            <a href="javascript:void(0)" class="forgot-link" (click)="onForgotPassword()">Forgot password?</a>
          </div>

          <div class="button-wrapper">
            <button type="submit" class="login-btn-custom" [disabled]="loading || loginForm.invalid">
              <span *ngIf="loading" class="spinner-border-custom"></span>
              {{ loading ? 'Signing in..' : 'Login Now' }}
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="graphic-section" [ngStyle]="{'background-image': 'url(/assets/landing/Rectangle.png)'}">
      <div class="wave wave1"></div>
      <div class="wave wave2"></div>
      
      <div class="glass-card">
        <div class="image-container">
          <img src="https://i.pinimg.com/736x/b5/3d/e0/b53de031e78d4fa12dab5e396f5bde2c.jpg" alt="Professional illustration">
        </div>
        <div class="badge-lightning">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="16" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
            <path d="M9 16l2 2 4-4"></path>
          </svg>
        </div>
      </div>
    </div>

  </div>
</div>
