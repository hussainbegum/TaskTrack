<div class="glass-container">
    <div class="glass-card">
        <h2>Update Profile</h2>
        <form (ngSubmit)="updateProfile()">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" [(ngModel)]="name" name="name" class="form-control" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" [(ngModel)]="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <button type="submit" class="btn-submit">Update Profile</button>
        </form>
    </div>
</div>
